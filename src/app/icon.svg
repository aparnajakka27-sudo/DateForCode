<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .silhouette-fill {
      fill: #0E111A;
    }
    .silhouette-stroke {
      stroke: #0E111A;
    }
    @media (prefers-color-scheme: dark) {
      .silhouette-fill {
        fill: #F3F4F6;
      }
      .silhouette-stroke {
        stroke: #F3F4F6;
      }
    }
  </style>
  <!-- Outer Pink Ring -->
  <circle cx="50" cy="50" r="40" stroke="#FF3366" stroke-width="10" />
  <!-- Inner Person Silhouette -->
  <circle class="silhouette-fill" cx="50" cy="42" r="10" />
  <path class="silhouette-stroke" d="M32 72C32 64 38 58 50 58C62 58 68 64 68 72" stroke-width="8" stroke-linecap="round" />
</svg>
